# ============================================================
# Deploy — 仅 workflow_dispatch：解析 digest → 灰度部署 SZ/SG
#
# 绝不包含 build 逻辑。镜像由 build.yml（push 触发）构建。
# digest 从最近的 build.yml 成功运行的 artifact 获取，
# 确保两节点拉到完全相同的 sha256 镜像。
#
# 回滚：填 image_sha（已有 tag），绕过 digest 直接按 tag 拉取。
# 显式 pin：填 build_run_id，锁定到某次 CI 构建的 digest。
#
# 所需 GitHub Secrets:
#   GHCR_TOKEN    — GitHub PAT (read:packages + write:packages)
#   SZ_DEPLOY_KEY — 深圳服务器 SSH 私钥
#   SG_DEPLOY_KEY — 新加坡服务器 SSH 私钥
# ============================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'both'
        type: choice
        options:
          - sz-only
          - sg-only
          - both
      image_sha:
        description: 'Rollback SHA tag (leave empty = deploy latest build)'
        required: false
        default: ''
        type: string
      build_run_id:
        description: 'Build workflow run ID (leave empty = latest successful build)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/verse-shiyu/character-distill-app
  NGINX_IMAGE: ghcr.io/verse-shiyu/character-distill-nginx

jobs:
  # ── 解析目标镜像：digest / rollback tag / pinned run ────────
  resolve-digest:
    runs-on: ubuntu-latest
    outputs:
      app_digest: ${{ steps.parse.outputs.app_digest }}
      nginx_digest: ${{ steps.parse.outputs.nginx_digest }}
      commit_sha: ${{ steps.parse.outputs.commit_sha }}
      build_run_id: ${{ steps.parse.outputs.build_run_id }}
      build_time: ${{ steps.parse.outputs.build_time }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      actions: read
    steps:
      - name: Resolve source build run
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.image_sha }}" ]; then
            echo "mode=rollback" >> $GITHUB_OUTPUT
            echo "commit_sha=${{ github.event.inputs.image_sha }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.build_run_id }}" ]; then
            echo "mode=pinned" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.event.inputs.build_run_id }}" >> $GITHUB_OUTPUT
          else
            echo "mode=latest" >> $GITHUB_OUTPUT
            RUN_ID=$(gh run list --workflow build.yml --branch main --status success --repo ${{ github.repository }} --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -z "${RUN_ID}" ]; then
              echo "::error::No successful build.yml run found on main branch"
              exit 1
            fi
            echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          fi

      - name: Download digest artifact
        if: steps.resolve.outputs.mode != 'rollback'
        uses: actions/download-artifact@v4
        with:
          name: digest-info
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Parse digests
        id: parse
        run: |
          if [ "${{ steps.resolve.outputs.mode }}" = "rollback" ]; then
            echo "app_digest=" >> $GITHUB_OUTPUT
            echo "nginx_digest=" >> $GITHUB_OUTPUT
            echo "commit_sha=${{ steps.resolve.outputs.commit_sha }}" >> $GITHUB_OUTPUT
            echo "build_run_id=" >> $GITHUB_OUTPUT
            echo "build_time=" >> $GITHUB_OUTPUT
          elif [ -f digest-info.json ]; then
            echo "app_digest=$(jq -r '.app_digest // empty' digest-info.json)" >> $GITHUB_OUTPUT
            echo "nginx_digest=$(jq -r '.nginx_digest // empty' digest-info.json)" >> $GITHUB_OUTPUT
            echo "commit_sha=$(jq -r '.commit_sha // empty' digest-info.json)" >> $GITHUB_OUTPUT
            echo "build_run_id=$(jq -r '.build_run_id // empty' digest-info.json)" >> $GITHUB_OUTPUT
            echo "build_time=$(jq -r '.build_time // empty' digest-info.json)" >> $GITHUB_OUTPUT
          else
            echo "::error::digest-info.json not found after artifact download"
            exit 1
          fi

      - name: Job summary
        run: |
          MODE="${{ steps.resolve.outputs.mode }}"
          TARGET="${{ github.event.inputs.target }}"
          COMMIT="${{ steps.parse.outputs.commit_sha }}"
          APP_DIGEST_VAL="${{ steps.parse.outputs.app_digest || '-' }}"
          NGINX_DIGEST_VAL="${{ steps.parse.outputs.nginx_digest || '-' }}"
          BUILD_RUN="${{ steps.parse.outputs.build_run_id || '-' }}"
          BUILD_TIME="${{ steps.parse.outputs.build_time || '-' }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Deploy target

          | Field | Value |
          |-------|-------|
          | **Mode** | ${MODE} |
          | **Target nodes** | ${TARGET} |
          | **Commit** | \`${COMMIT}\` |
          | **App image digest** | \`${APP_DIGEST_VAL}\` |
          | **Nginx image digest** | \`${NGINX_DIGEST_VAL}\` |
          | **Build run ID** | ${BUILD_RUN} |
          | **Build time** | ${BUILD_TIME} |
          EOF

  # ── 灰度部署深圳 ───────────────────────────────────────────
  deploy-sz:
    needs: resolve-digest
    if: always() && needs.resolve-digest.result == 'success' && (github.event.inputs.target == 'sz-only' || github.event.inputs.target == 'both')
    runs-on: ubuntu-latest
    env:
      APP_DIGEST: ${{ needs.resolve-digest.outputs.app_digest }}
      NGINX_DIGEST: ${{ needs.resolve-digest.outputs.nginx_digest }}
      COMMIT_SHA: ${{ needs.resolve-digest.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Push docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 47.107.42.111
          username: root
          key: ${{ secrets.SZ_DEPLOY_KEY }}
          source: docker-compose.prod.yml
          target: /opt/character-distill/
          overwrite: true

      - name: Deploy to Shenzhen
        uses: appleboy/ssh-action@v1
        with:
          host: 47.107.42.111
          username: root
          key: ${{ secrets.SZ_DEPLOY_KEY }}
          envs: APP_DIGEST,NGINX_DIGEST,COMMIT_SHA
          script: |
            set -e
            cd /opt/character-distill

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u verse-shiyu --password-stdin

            # Record current version for rollback
            PREV_SHA=$(docker inspect --format='{{index .Config.Image}}' character-distill-app-1 2>/dev/null | grep -oE '[a-f0-9]{40}' || echo "")
            echo "Previous version: ${PREV_SHA:-first deploy}"
            echo "Target commit: ${COMMIT_SHA}"

            if [ -z "${COMMIT_SHA}" ]; then
              echo "FATAL: COMMIT_SHA is empty, cannot deploy"
              exit 1
            fi

            # Pull by digest (pin exact image), or by tag for rollback
            if [ -n "${APP_DIGEST}" ]; then
              docker pull ghcr.io/verse-shiyu/character-distill-app@${APP_DIGEST}
              docker tag ghcr.io/verse-shiyu/character-distill-app@${APP_DIGEST} ghcr.io/verse-shiyu/character-distill-app:${COMMIT_SHA}
            else
              docker pull ghcr.io/verse-shiyu/character-distill-app:${COMMIT_SHA}
            fi

            if [ -n "${NGINX_DIGEST}" ]; then
              docker pull ghcr.io/verse-shiyu/character-distill-nginx@${NGINX_DIGEST}
              docker tag ghcr.io/verse-shiyu/character-distill-nginx@${NGINX_DIGEST} ghcr.io/verse-shiyu/character-distill-nginx:${COMMIT_SHA}
            else
              docker pull ghcr.io/verse-shiyu/character-distill-nginx:${COMMIT_SHA}
            fi

            export APP_IMAGE_TAG=${COMMIT_SHA}
            export NGINX_IMAGE_TAG=${COMMIT_SHA}
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Health check (max 60s)
            echo "Waiting for health check..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:7860/api/health > /dev/null 2>&1; then
                echo "SZ health check passed (attempt ${i})"
                HEALTHY=1
                break
              fi
              echo "  Attempt ${i}/12 failed..."
            done

            # Rollback on failure
            if [ "$HEALTHY" -ne 1 ]; then
              echo "SZ health check FAILED, rolling back..."
              if [ -n "$PREV_SHA" ]; then
                docker pull ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA}
                docker pull ghcr.io/verse-shiyu/character-distill-nginx:${PREV_SHA}
                export APP_IMAGE_TAG=${PREV_SHA}
                export NGINX_IMAGE_TAG=${PREV_SHA}
                docker compose -f docker-compose.prod.yml up -d
                echo "Rolled back to ${PREV_SHA}"
              fi
              exit 1
            fi

            docker image prune -f
            echo "SZ deployment successful"

  # ── 部署新加坡 ────────────────────────────────────────────
  deploy-sg:
    needs: [resolve-digest, deploy-sz]
    if: |
      always() && needs.resolve-digest.result == 'success' && (
      github.event.inputs.target == 'sg-only' ||
      (github.event.inputs.target == 'both' && needs.deploy-sz.result == 'success')
      )
    runs-on: ubuntu-latest
    env:
      APP_DIGEST: ${{ needs.resolve-digest.outputs.app_digest }}
      NGINX_DIGEST: ${{ needs.resolve-digest.outputs.nginx_digest }}
      COMMIT_SHA: ${{ needs.resolve-digest.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Push docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 43.134.55.201
          username: ubuntu
          key: ${{ secrets.SG_DEPLOY_KEY }}
          source: docker-compose.prod.yml
          target: /home/ubuntu/Character-distill/
          overwrite: true

      - name: Deploy to Singapore
        uses: appleboy/ssh-action@v1
        with:
          host: 43.134.55.201
          username: ubuntu
          key: ${{ secrets.SG_DEPLOY_KEY }}
          envs: APP_DIGEST,NGINX_DIGEST,COMMIT_SHA
          script: |
            set -e
            cd /home/ubuntu/Character-distill

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u verse-shiyu --password-stdin

            PREV_SHA=$(docker inspect --format='{{index .Config.Image}}' character-distill-app-1 2>/dev/null | grep -oE '[a-f0-9]{40}' || echo "")
            echo "Previous version: ${PREV_SHA:-first deploy}"
            echo "Target commit: ${COMMIT_SHA}"

            if [ -z "${COMMIT_SHA}" ]; then
              echo "FATAL: COMMIT_SHA is empty, cannot deploy"
              exit 1
            fi

            if [ -n "${APP_DIGEST}" ]; then
              docker pull ghcr.io/verse-shiyu/character-distill-app@${APP_DIGEST}
              docker tag ghcr.io/verse-shiyu/character-distill-app@${APP_DIGEST} ghcr.io/verse-shiyu/character-distill-app:${COMMIT_SHA}
            else
              docker pull ghcr.io/verse-shiyu/character-distill-app:${COMMIT_SHA}
            fi

            if [ -n "${NGINX_DIGEST}" ]; then
              docker pull ghcr.io/verse-shiyu/character-distill-nginx@${NGINX_DIGEST}
              docker tag ghcr.io/verse-shiyu/character-distill-nginx@${NGINX_DIGEST} ghcr.io/verse-shiyu/character-distill-nginx:${COMMIT_SHA}
            else
              docker pull ghcr.io/verse-shiyu/character-distill-nginx:${COMMIT_SHA}
            fi

            export APP_IMAGE_TAG=${COMMIT_SHA}
            export NGINX_IMAGE_TAG=${COMMIT_SHA}
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Waiting for health check..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:7860/api/health > /dev/null 2>&1; then
                echo "SG health check passed (attempt ${i})"
                HEALTHY=1
                break
              fi
              echo "  Attempt ${i}/12 failed..."
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "SG health check FAILED, rolling back..."
              if [ -n "$PREV_SHA" ]; then
                docker pull ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA}
                docker pull ghcr.io/verse-shiyu/character-distill-nginx:${PREV_SHA}
                export APP_IMAGE_TAG=${PREV_SHA}
                export NGINX_IMAGE_TAG=${PREV_SHA}
                docker compose -f docker-compose.prod.yml up -d
                echo "Rolled back to ${PREV_SHA}"
              fi
              exit 1
            fi

            docker image prune -f
            echo "SG deployment successful"
