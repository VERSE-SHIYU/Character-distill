# ============================================================
# Build & Deploy — GHCR + 双节点灰度部署
#
# 流程：test → build(GHCR) → deploy SZ(灰度) → deploy SG
# 回滚：健康检查失败自动回滚到上一个 sha
#
# 所需 GitHub Secrets:
#   GHCR_TOKEN    — GitHub PAT (read:packages + write:packages)
#   SZ_DEPLOY_KEY — 深圳服务器 SSH 私钥
#   SG_DEPLOY_KEY — 新加坡服务器 SSH 私钥
# ============================================================

name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/verse-shiyu/character-distill-app
  NGINX_IMAGE: ghcr.io/verse-shiyu/character-distill-nginx

jobs:
  # ── 关卡1：测试 ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: charsim
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: charsim
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pytest pytest-asyncio

      - name: Run tests
        env:
          STORAGE_BACKEND: postgres
          DATABASE_URL: postgresql://charsim:ci_test_password@localhost:5432/charsim
          JWT_SECRET: ci-test-only-jwt-secret-not-for-production-use-0123456789abcdef
        run: pytest tests/ -v --tb=short

  # ── 关卡2：构建并推送到 GHCR ────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:latest
            ${{ env.NGINX_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 关卡3a：灰度部署深圳 ────────────────────────────────────
  deploy-sz:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Shenzhen
        uses: appleboy/ssh-action@v1
        with:
          host: 47.107.42.111
          username: root
          key: ${{ secrets.SZ_DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/character-distill

            # 拉最新代码（获取更新后的 docker-compose.prod.yml）
            git pull origin main

            # 记录当前版本用于回滚
            PREV_SHA=$(docker inspect --format='{{index .Config.Image}}' character-distill-app-1 2>/dev/null | grep -oE '[a-f0-9]{40}' || echo "")
            echo "上一个版本: ${PREV_SHA:-首次部署}"

            # 登录 GHCR 并拉取新镜像
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u verse-shiyu --password-stdin
            docker compose -f docker-compose.prod.yml pull app nginx

            # 部署
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 健康检查（最多 60 秒）
            echo "等待健康检查..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:7860/api/health > /dev/null 2>&1; then
                echo "✅ SZ 健康检查通过（第 ${i} 次）"
                HEALTHY=1
                break
              fi
              echo "  第 ${i}/12 次未通过..."
            done

            # 失败回滚
            if [ "$HEALTHY" -ne 1 ]; then
              echo "❌ SZ 健康检查失败，回滚..."
              if [ -n "$PREV_SHA" ]; then
                docker pull ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA}
                docker tag ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA} ghcr.io/verse-shiyu/character-distill-app:latest
                docker compose -f docker-compose.prod.yml up -d
                echo "已回滚到 ${PREV_SHA}"
              fi
              exit 1
            fi

            docker image prune -f
            echo "✅ SZ 部署成功"

  # ── 关卡3b：部署新加坡（SZ 通过后才执行） ────────────────────
  deploy-sg:
    needs: deploy-sz
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Singapore
        uses: appleboy/ssh-action@v1
        with:
          host: 43.134.55.201
          username: ubuntu
          key: ${{ secrets.SG_DEPLOY_KEY }}
          script: |
            set -e
            cd /home/ubuntu/Character-distill

            git pull origin main

            PREV_SHA=$(docker inspect --format='{{index .Config.Image}}' character-distill-app-1 2>/dev/null | grep -oE '[a-f0-9]{40}' || echo "")
            echo "上一个版本: ${PREV_SHA:-首次部署}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u verse-shiyu --password-stdin
            docker compose -f docker-compose.prod.yml pull app nginx

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "等待健康检查..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:7860/api/health > /dev/null 2>&1; then
                echo "✅ SG 健康检查通过（第 ${i} 次）"
                HEALTHY=1
                break
              fi
              echo "  第 ${i}/12 次未通过..."
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "❌ SG 健康检查失败，回滚..."
              if [ -n "$PREV_SHA" ]; then
                docker pull ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA}
                docker tag ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA} ghcr.io/verse-shiyu/character-distill-app:latest
                docker compose -f docker-compose.prod.yml up -d
                echo "已回滚到 ${PREV_SHA}"
              fi
              exit 1
            fi

            docker image prune -f
            echo "✅ SG 部署成功"
