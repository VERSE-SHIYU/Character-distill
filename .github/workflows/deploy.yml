# ============================================================
# Build & Deploy — GHCR + 双节点灰度部署
#
# 流程：push → test + build(GHCR)；手动触发 → 部署 SZ→SG
# 回滚：健康检查失败自动回滚到上一个 sha
#
# 所需 GitHub Secrets:
#   GHCR_TOKEN    — GitHub PAT (read:packages + write:packages)
#   SZ_DEPLOY_KEY — 深圳服务器 SSH 私钥
#   SG_DEPLOY_KEY — 新加坡服务器 SSH 私钥
# ============================================================

name: Build & Deploy

on:
  push:
    branches: [main]    # push 只跑 test + build
  workflow_dispatch:     # 手动触发时才部署
    inputs:
      target:
        description: '部署目标'
        required: true
        default: 'both'
        type: choice
        options:
          - sz-only
          - sg-only
          - both
      image_sha:
        description: '镜像 SHA 标签（留空=最新 build）'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/verse-shiyu/character-distill-app
  NGINX_IMAGE: ghcr.io/verse-shiyu/character-distill-nginx

jobs:
  # ── 关卡1：测试 ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: charsim
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: charsim
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pytest pytest-asyncio

      - name: Run tests
        env:
          STORAGE_BACKEND: postgres
          DATABASE_URL: postgresql://charsim:ci_test_password@localhost:5432/charsim
          JWT_SECRET: ci-test-only-jwt-secret-not-for-production-use-0123456789abcdef
        run: pytest tests/ -v --tb=short

  # ── 关卡2：构建并推送到 GHCR ────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.export_sha.outputs.commit_sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Export commit SHA for downstream deploy
        id: export_sha
        run: echo "commit_sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:latest
            ${{ env.NGINX_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 关卡3a：灰度部署深圳 ────────────────────────────────────
  deploy-sz:
    needs: build
    if: always() && needs.build.result == 'success' && (github.event.inputs.target == 'sz-only' || github.event.inputs.target == 'both')
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: ${{ github.event.inputs.image_sha || needs.build.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Push docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 47.107.42.111
          username: root
          key: ${{ secrets.SZ_DEPLOY_KEY }}
          source: docker-compose.prod.yml
          target: /opt/character-distill/
          overwrite: true

      - name: Deploy to Shenzhen
        uses: appleboy/ssh-action@v1
        with:
          host: 47.107.42.111
          username: root
          key: ${{ secrets.SZ_DEPLOY_KEY }}
          envs: TARGET_SHA
          script: |
            set -e
            cd /opt/character-distill

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u verse-shiyu --password-stdin

            # 记录当前版本用于回滚
            PREV_SHA=$(docker inspect --format='{{index .Config.Image}}' character-distill-app-1 2>/dev/null | grep -oE '[a-f0-9]{40}' || echo "")
            echo "当前版本: ${PREV_SHA:-首次部署}"
            echo "目标版本: ${TARGET_SHA}"

            # 拉取目标镜像
            docker pull ghcr.io/verse-shiyu/character-distill-app:${TARGET_SHA}
            docker pull ghcr.io/verse-shiyu/character-distill-nginx:${TARGET_SHA}

            # 部署（环境变量交给 compose 解析 image tag）
            export APP_IMAGE_TAG=${TARGET_SHA}
            export NGINX_IMAGE_TAG=${TARGET_SHA}
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 健康检查（最多 60 秒）
            echo "等待健康检查..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:7860/api/health > /dev/null 2>&1; then
                echo "✅ SZ 健康检查通过（第 ${i} 次）"
                HEALTHY=1
                break
              fi
              echo "  第 ${i}/12 次未通过..."
            done

            # 失败回滚
            if [ "$HEALTHY" -ne 1 ]; then
              echo "❌ SZ 健康检查失败，回滚..."
              if [ -n "$PREV_SHA" ]; then
                docker pull ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA}
                docker pull ghcr.io/verse-shiyu/character-distill-nginx:${PREV_SHA}
                export APP_IMAGE_TAG=${PREV_SHA}
                export NGINX_IMAGE_TAG=${PREV_SHA}
                docker compose -f docker-compose.prod.yml up -d
                echo "已回滚到 ${PREV_SHA}"
              fi
              exit 1
            fi

            docker image prune -f
            echo "✅ SZ 部署成功"

  # ── 关卡3b：部署新加坡 ────────────────────────────────────
  deploy-sg:
    needs: [build, deploy-sz]
    if: |
      always() && needs.build.result == 'success' && (
      github.event.inputs.target == 'sg-only' ||
      (github.event.inputs.target == 'both' && needs.deploy-sz.result == 'success')
      )
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: ${{ github.event.inputs.image_sha || needs.build.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Push docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 43.134.55.201
          username: ubuntu
          key: ${{ secrets.SG_DEPLOY_KEY }}
          source: docker-compose.prod.yml
          target: /home/ubuntu/Character-distill/
          overwrite: true

      - name: Deploy to Singapore
        uses: appleboy/ssh-action@v1
        with:
          host: 43.134.55.201
          username: ubuntu
          key: ${{ secrets.SG_DEPLOY_KEY }}
          envs: TARGET_SHA
          script: |
            set -e
            cd /home/ubuntu/Character-distill

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u verse-shiyu --password-stdin

            PREV_SHA=$(docker inspect --format='{{index .Config.Image}}' character-distill-app-1 2>/dev/null | grep -oE '[a-f0-9]{40}' || echo "")
            echo "当前版本: ${PREV_SHA:-首次部署}"
            echo "目标版本: ${TARGET_SHA}"

            docker pull ghcr.io/verse-shiyu/character-distill-app:${TARGET_SHA}
            docker pull ghcr.io/verse-shiyu/character-distill-nginx:${TARGET_SHA}

            export APP_IMAGE_TAG=${TARGET_SHA}
            export NGINX_IMAGE_TAG=${TARGET_SHA}
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "等待健康检查..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              if curl -sf http://localhost:7860/api/health > /dev/null 2>&1; then
                echo "✅ SG 健康检查通过（第 ${i} 次）"
                HEALTHY=1
                break
              fi
              echo "  第 ${i}/12 次未通过..."
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "❌ SG 健康检查失败，回滚..."
              if [ -n "$PREV_SHA" ]; then
                docker pull ghcr.io/verse-shiyu/character-distill-app:${PREV_SHA}
                docker pull ghcr.io/verse-shiyu/character-distill-nginx:${PREV_SHA}
                export APP_IMAGE_TAG=${PREV_SHA}
                export NGINX_IMAGE_TAG=${PREV_SHA}
                docker compose -f docker-compose.prod.yml up -d
                echo "已回滚到 ${PREV_SHA}"
              fi
              exit 1
            fi

            docker image prune -f
            echo "✅ SG 部署成功"
