# ============================================================
# Build — push 触发：test → build → push GHCR → 存 digest
#
# 绝不包含部署逻辑。部署见 deploy.yml（workflow_dispatch 专用）。
# ============================================================

name: Build

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/verse-shiyu/character-distill-app
  NGINX_IMAGE: ghcr.io/verse-shiyu/character-distill-nginx
  ALIYUN_REGISTRY: crpi-4frg6xezdr40bmtr.cn-shenzhen.personal.cr.aliyuncs.com
  ALIYUN_APP_IMAGE: crpi-4frg6xezdr40bmtr.cn-shenzhen.personal.cr.aliyuncs.com/verse-shiyu/character-distill-app
  ALIYUN_NGINX_IMAGE: crpi-4frg6xezdr40bmtr.cn-shenzhen.personal.cr.aliyuncs.com/verse-shiyu/character-distill-nginx

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: charsim
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: charsim
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pytest pytest-asyncio

      - name: Run tests
        env:
          STORAGE_BACKEND: postgres
          DATABASE_URL: postgresql://charsim:ci_test_password@localhost:5432/charsim
          JWT_SECRET: ci-test-only-jwt-secret-not-for-production-use-0123456789abcdef
        run: pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun CR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push app image
        id: build_app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push app image to Aliyun CR
        continue-on-error: true
        run: |
          docker pull ${{ env.APP_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.APP_IMAGE }}:${{ github.sha }} ${{ env.ALIYUN_APP_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.APP_IMAGE }}:${{ github.sha }} ${{ env.ALIYUN_APP_IMAGE }}:latest
          docker push ${{ env.ALIYUN_APP_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ALIYUN_APP_IMAGE }}:latest

      - name: Build and push nginx image
        id: build_nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:latest
            ${{ env.NGINX_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push nginx image to Aliyun CR
        continue-on-error: true
        run: |
          docker pull ${{ env.NGINX_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.NGINX_IMAGE }}:${{ github.sha }} ${{ env.ALIYUN_NGINX_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.NGINX_IMAGE }}:${{ github.sha }} ${{ env.ALIYUN_NGINX_IMAGE }}:latest
          docker push ${{ env.ALIYUN_NGINX_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ALIYUN_NGINX_IMAGE }}:latest

      - name: Write digest file
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg app "${{ steps.build_app.outputs.digest }}" \
            --arg nginx "${{ steps.build_nginx.outputs.digest }}" \
            --arg sha "${{ github.sha }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg time "${BUILD_TIME}" \
            '{app_digest: $app, nginx_digest: $nginx, commit_sha: $sha, build_run_id: $run_id, build_time: $time}' \
            > digest-info.json

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-info
          retention-days: 30
          if-no-files-found: error
          path: digest-info.json

      - name: Job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Build result

          | Image | Digest |
          |-------|--------|
          | App | \`${{ steps.build_app.outputs.digest }}\` |
          | Nginx | \`${{ steps.build_nginx.outputs.digest }}\` |

          **Commit:** \`${{ github.sha }}\`
          **Run ID:** ${{ github.run_id }}
          EOF
