distill:
  chunk_size: 5000
  max_profile_len: 8000
llm:
  # api_key 请在 .env 中设置 DEEPSEEK_API_KEY，或在 Web 设置页填写
  base_url: https://api.deepseek.com
  max_tokens: 1024
  model: deepseek-v4-pro
  summary_threshold: 100
  temperature: 0.7
rag:
  chunk_overlap: 50
  chunk_size: 500
  embedding_model: all-MiniLM-L6-v2
  top_k: 3
storage:
  path: data/character_sim.db
  type: sqlite
voice:
  cache_dir: data/voice_cache
  default_speed: 1.0
  enabled: false
  funasr_url: ws://127.0.0.1:10095
  gptsovits_url: http://127.0.0.1:9880
  ref_audio_max_seconds: 60
  ref_audio_min_seconds: 30
wechat:
  agent_id: ''
  corp_id: ''
  default_text_id: ''
  enabled: false
  encoding_aes_key: ''
  secret: ''
  token: ''
memory:
  enabled: true
  provider: "local"
  search_top_k: 10
  context_window: 30
