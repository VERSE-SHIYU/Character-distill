distill:
  chunk_size: 5000
  max_profile_len: 8000
llm:
  # api_key 请在 .env 中设置 DEEPSEEK_API_KEY，或在 Web 设置页填写
  base_url: https://api.deepseek.com
  max_tokens: 4096
  model: deepseek-v4-pro
  presence_penalty: 0.3  # 防重复，温和不磨平口头禅
  summary_threshold: 100
  temperature: 0.7
rag:
  chunk_overlap: 50
  chunk_size: 500
  top_k: 3
  # embedding_model 已废弃（改为固定使用阿里云百炼 text-embedding-v4），
  # 用户在设置页填写 DASHSCOPE_API_KEY 即可。
  # key 和 region 为每个用户独立配置，不由全局配置决定。
# 存储后端由 .env 的 STORAGE_BACKEND 决定：
#   STORAGE_BACKEND=postgres -> 用 DATABASE_URL（生产推荐），忽略下方 path
#   STORAGE_BACKEND=sqlite   -> 用下方 path（本地开发 / 回退）
storage:
  path: data/character_sim.db
  type: sqlite
voice:
  cache_dir: data/voice_cache
  default_speed: 1.0
  enabled: false
  funasr_url: ws://127.0.0.1:10095
  gptsovits_url: http://127.0.0.1:9880
  ref_audio_max_seconds: 60
  ref_audio_min_seconds: 30
wechat:
  agent_id: ''
  corp_id: ''
  default_text_id: ''
  enabled: false
  encoding_aes_key: ''
  secret: ''
  token: ''
memory:
  enabled: true
  provider: "local"
  search_top_k: 10
  context_window: 30
