# ============================================================
# OpenResty 生产环境配置
# 职责: HTTPS终结 + WAF + CC限流 + 反向代理 + 安全头
# ============================================================

worker_processes auto;
error_log /var/log/openresty/error.log warn;
pid /var/run/openresty.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/openresty/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20m;        # 与FastAPI层一致（音频/视频上传最大20MB）
    server_tokens off;

    # ---- Gzip ----
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ---- Lua shared dicts (CC限流用) ----
    lua_shared_dict cc_ban 10m;
    lua_shared_dict cc_req 10m;

    server {
        listen 80;
        server_name _;

        # 跨境节点专用端点（HTTP，用于 HMAC 签名的跨节点通信）
        # 必须排在 location / 之前，否则默认匹配会被 301 重定向
        location /api/inter-node/ {
            allow PEER_NODE_IP_PLACEHOLDER;   # 对端节点公网 IP
            allow 127.0.0.1;
            deny all;
            proxy_pass http://app:7860;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # 其余 HTTP 请求全部重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;

        # ---- 安全响应头（OpenResty层兜底） ----
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS：强制浏览器后续只用 HTTPS（1年），工业级标配
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---- 源站保护说明 ----
        # WAF+CC 移到 /api/ 和 /api/inter-node/ 内部
        # 放在 server 级别会导致 HTTP/2 静态资源请求因
        # "attempt to yield across C-call boundary" 而崩溃
        # 本机应用端口 7860 已绑 127.0.0.1（见 compose），外网只能经此 nginx。
        # 若将来接入 CDN，在此处按 CDN 回源 IP 段做 allow/deny 白名单。
        # 当前单机直连模式无需 CDN 白名单，保持简单。

        # ---- 健康检查端点 ----
        location /health {
            allow 127.0.0.1;
            deny all;
            proxy_pass http://app:7860/api/health;
        }

        # ---- 跨境节点专用端点：仅允许对端节点 IP，纵深防御第一层 ----
        # 必须排在前面的原因是：nginx 按最长前缀匹配，但放在这里确保
        # /api/inter-node/ 路径不走下面无 IP 限制的 /api/ 块。
        # 部署验证：curl -X POST http://<host>/api/inter-node/dm/receive \
        #   -H "Content-Type: application/json" -d '{}' \
        #   --connect-to <实际IP>   # 非白名单 IP 应得 403
        location /api/inter-node/ {
            allow PEER_NODE_IP_PLACEHOLDER;   # 对端节点公网 IP(新加坡↔深圳)
            allow 127.0.0.1;                  # 本机自测
            deny all;
            access_by_lua_block {
                dofile("/etc/nginx/waf.lua")
                dofile("/etc/nginx/cc.lua")
            }
            proxy_pass http://app:7860;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # ---- API ----
        location /api/ {
            access_by_lua_block {
                dofile("/etc/nginx/waf.lua")
                dofile("/etc/nginx/cc.lua")
            }
            proxy_pass http://app:7860;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
        }

        # ---- 前端静态资源 ----
        location / {
            proxy_pass http://app:7860;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
