# ============================================================
# OpenResty 生产环境配置
# 职责: HTTPS终结 + WAF + CC限流 + 反向代理 + 安全头
# ============================================================

worker_processes auto;
error_log /var/log/openresty/error.log warn;
pid /var/run/openresty.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/openresty/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20m;        # 与FastAPI层一致（音频/视频上传最大20MB）
    server_tokens off;

    # ---- Gzip ----
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # ---- Lua shared dicts (CC限流用) ----
    lua_shared_dict cc_ban 10m;
    lua_shared_dict cc_req 10m;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;

        # ---- 安全响应头（OpenResty层兜底） ----
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- WAF + CC: 合并为一个access阶段 ----
        access_by_lua_block {
            dofile("/etc/nginx/waf.lua")
            dofile("/etc/nginx/cc.lua")
        }

        # ---- 拦截CDN直接访问（非白名单）保护源站 ----
        set $allow 0;
        if ($http_x-forwarded-for) { set $allow 1; }
        # CDN回源IP段（按腾讯云CDN回源IP更新）
        # set $allow 1;  # 生产环境取消注释并限制CDN IP段

        # ---- 健康检查端点 ----
        location /health {
            allow 127.0.0.1;
            deny all;
            proxy_pass http://app:7860/api/health;
        }

        # ---- API ----
        location /api/ {
            proxy_pass http://app:7860;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
        }

        # ---- 前端静态资源 ----
        location / {
            proxy_pass http://app:7860;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
