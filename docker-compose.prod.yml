# ============================================================
# 生产环境编排（精简版 · 适配 2G 内存瘦客户端）
# 架构：OpenResty(HTTPS+WAF+CC) + FastAPI(app) + PostgreSQL + Fail2Ban
#
# 设计前提（与实际一致）：
#   - Embedding / 大模型 / 蒸馏 全部走外部 API，本机不跑 AI 模型
#   - 语音用 edge-tts（云端），本机无 torch / GPT-SoVITS 重包
#   - 因此本机是"转发 + 存储"的轻量后端，2G 内存足够
#   - 已在宿主机配置 2G swap 作为内存兜底
#   - 第一版单机部署（深圳主机），新加坡暂不启用
#
# 相比旧版改动：
#   1. 砍掉 goaccess（监控锦上添花，用户量上来再加）
#   2. 全部容器加 mem_limit（防单容器吃爆 2G 拖垮数据库）
#   3. postgres 加 OOM 保护 + 调小 shared_buffers 适配小内存
#   4. 前端构建建议放本地/CI，不在 2G 机器上 npm build（见 DEPLOY.md）
#
# 启动：docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      LANG: C.UTF-8
    # 小内存调优：限制 shared_buffers 和连接数，避免 PG 自身撑爆内存限制
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
    volumes:
      - pg_data:/var/lib/postgresql/data
    # 仅本机暴露，绝不对公网开放 5432
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 数据库最该被保护：降低被 OOM Killer 选中的概率
    oom_score_adj: -500
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - prod

  app:
    image: crpi-4frg6xezdr40bmtr.cn-shenzhen.personal.cr.aliyuncs.com/verse-shiyu/character-distill-app:latest
    # 仅本机暴露，外网只能经 nginx 进来
    ports:
      - "127.0.0.1:7860:7860"
    volumes:
      # ./data 用于 chromadb 向量库、voice_cache 等非关系数据，必须持久化
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # 容器内连库必须用 compose 服务名 postgres，不能写 localhost
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    # app 比数据库更适合被先杀（杀了能自动重启，数据库不能）
    oom_score_adj: 300
    mem_limit: 768m
    mem_reservation: 384m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - prod

  nginx:
    image: crpi-4frg6xezdr40bmtr.cn-shenzhen.personal.cr.aliyuncs.com/verse-shiyu/character-distill-nginx:latest
    environment:
      - PEER_NODE_IP=${PEER_NODE_IP}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl_certs:/etc/ssl:ro
      - nginx_logs:/var/log/openresty
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
    mem_limit: 128m
    mem_reservation: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - prod

  fail2ban:
    image: crazymax/fail2ban:latest
    volumes:
      - nginx_logs:/var/log/openresty:ro
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    mem_limit: 96m
    mem_reservation: 48m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - prod

# 内存账（2G 机器）：
#   postgres 512m + app 768m + nginx 128m + fail2ban 96m ≈ 1.5G
#   宿主系统 ~400m，剩余靠 2G swap 兜底，安全。

networks:
  prod:

volumes:
  ssl_certs:
  nginx_logs:
  pg_data:
