# ============================================================
# 生产环境编排: OpenResty (HTTPS + WAF) + FastAPI + Fail2Ban + GoAccess
# 启动: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl_certs:/etc/ssl:ro
      - nginx_logs:/var/log/openresty
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - prod

  app:
    build: .
    ports:
      - "127.0.0.1:7860:7860"   # 仅本地暴露
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - prod

  fail2ban:
    image: crazymax/fail2ban:latest
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    networks:
      - prod

  goaccess:
    image: xavierh/goaccess-for-nginxproxymanager:latest
    volumes:
      - nginx_logs:/opt/log:ro
    ports:
      - "127.0.0.1:7890:7890"
    command: --real-time-html -f /opt/log/access.log -o /opt/log/report.html --log-format=COMBINED
    restart: unless-stopped

networks:
  prod:

volumes:
  ssl_certs:
  nginx_logs:
