# ============================================================
# 生产环境编排: OpenResty (HTTPS + WAF) + FastAPI + PostgreSQL + Fail2Ban + GoAccess
# 启动: docker compose -f docker-compose.prod.yml up -d
#
# 单地域单库设计：本文件在【深圳】和【新加坡】两台机器上各跑一份，
# 各自连各自本机的 postgres 容器，两库互不连接、互不同步（合规：分库存储）。
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      LANG: C.UTF-8
    volumes:
      - pg_data:/var/lib/postgresql/data
    # 仅本机暴露，绝不对公网开放 5432
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prod

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl_certs:/etc/ssl:ro
      - nginx_logs:/var/log/openresty
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - prod

  app:
    build: .
    ports:
      - "127.0.0.1:7860:7860"   # 仅本地暴露
    volumes:
      # PostgreSQL 只接管关系型数据；./data 仍用于 chromadb 向量库、voice_cache 等非关系数据，必须保留。
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # 容器内必须用 compose 服务名 postgres，不能是 localhost
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - prod

  fail2ban:
    image: crazymax/fail2ban:latest
    volumes:
      - nginx_logs:/var/log/openresty:ro
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    networks:
      - prod

  goaccess:
    image: allinurl/goaccess:latest
    volumes:
      - nginx_logs:/var/log/openresty:ro
    ports:
      - "127.0.0.1:7890:7890"
    command: --real-time-html -f /var/log/openresty/access.log -o /var/log/openresty/report.html --log-format=COMBINED
    restart: unless-stopped
    networks:
      - prod

networks:
  prod:

volumes:
  ssl_certs:
  nginx_logs:
  pg_data:
